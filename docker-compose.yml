services:
  backend:
    build:
      context: .
      dockerfile: NotifyHub.Presentation/Dockerfile
    ports:
      - "5294:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./NotifyHub.Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
